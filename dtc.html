<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle">Audi DTC</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.glass {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

.fade-in {
  animation: fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(10px); }
  to { opacity:1; transform: translateY(0); }
}
</style>
</head>

<body class="bg-black text-white">

<!-- NAV -->
<nav class="glass fixed w-full top-0 p-4 flex justify-between z-50">
  <div class="font-bold text-lg">
    AUDI<span class="text-red-500">DTC</span>
  </div>
  <a href="index.html" class="text-gray-400 hover:text-white">← Back</a>
</nav>

<!-- HERO -->
<section class="pt-24 pb-10 text-center fade-in">
  <h1 id="codeTitle" class="text-4xl md:text-6xl font-black"></h1>
  <p id="codeDesc" class="text-gray-400 mt-2"></p>

  <!-- STATS BAR -->
  <div class="mt-6 grid grid-cols-2 md:grid-cols-4 gap-3 max-w-3xl mx-auto">

    <div class="glass p-3 rounded text-center">
      <div class="text-xs text-gray-400">Difficulty</div>
      <div id="difficulty" class="font-bold"></div>
    </div>

    <div class="glass p-3 rounded text-center">
      <div class="text-xs text-gray-400">Repair Time</div>
      <div id="repairTime" class="font-bold"></div>
    </div>

    <div class="glass p-3 rounded text-center">
      <div class="text-xs text-gray-400">Cost</div>
      <div id="cost" class="font-bold"></div>
    </div>

    <div class="glass p-3 rounded text-center">
      <div class="text-xs text-gray-400">Severity</div>
      <div id="severity" class="font-bold"></div>
    </div>

  </div>
</section>

<!-- CONTENT -->
<section class="max-w-5xl mx-auto px-4 space-y-8 pb-20 fade-in">

<!-- WHY IT MATTERS -->
<div class="bg-red-500/10 border border-red-500/20 p-6 rounded-xl">
  <h2 class="text-xl font-bold text-red-400 mb-2">Why This Matters</h2>
  <p id="severityExplanation" class="text-gray-300"></p>
</div>

<!-- SYMPTOMS -->
<div class="glass p-6 rounded-xl">
  <h2 class="text-xl font-bold mb-3">Symptoms</h2>
  <ul id="symptoms" class="space-y-2 text-gray-300"></ul>
</div>

<!-- CAUSES -->
<div class="glass p-6 rounded-xl">
  <h2 class="text-xl font-bold mb-3">Causes</h2>
  <ul id="causes" class="space-y-2 text-gray-300"></ul>
</div>

<!-- FIXES -->
<div class="glass p-6 rounded-xl">
  <h2 class="text-xl font-bold mb-3">How to Fix</h2>
  <ul id="fixes" class="space-y-2 text-gray-300"></ul>
</div>

<!-- RELATED -->
<div class="glass p-6 rounded-xl">
  <h2 class="text-xl font-bold mb-3">Related Codes</h2>
  <div id="relatedCodes" class="flex flex-wrap gap-2"></div>
</div>

<div class="glass p-6 rounded">
  <h2 class="font-bold mb-2">Detailed Overview</h2>
  <p id="deepDive"></p>
</div>

<div class="glass p-6 rounded">
  <h2 class="font-bold mb-2">Step-by-Step Diagnosis</h2>
  <ul id="diagnosisSteps"></ul>
</div>

<div class="glass p-6 rounded">
  <h2 class="font-bold mb-2">Common Mistakes</h2>
  <ul id="commonMistakes"></ul>
</div>

<div class="glass p-6 rounded">
  <h2 class="font-bold mb-2">Cost Breakdown</h2>
  <div id="costBreakdown"></div>
</div>

</section>

<script src="dtcData.js"></script>

<script>
// GET CODE FROM URL
const params = new URLSearchParams(window.location.search);
const code = params.get("code");

// LOAD DATA
const dtc = dtcDatabase[code];

if (!dtc) {
  document.body.innerHTML = "<h1 style='padding:40px'>Code not found</h1>";
}

// SET TITLE
document.getElementById("pageTitle").innerText = `${code} Audi Code`;
document.getElementById("codeTitle").innerText = code;
document.getElementById("codeDesc").innerText = dtc.description;

// STATS
document.getElementById("difficulty").innerText = dtc.difficulty || "N/A";
document.getElementById("repairTime").innerText = dtc.repairTime || "N/A";
document.getElementById("cost").innerText = dtc.estimatedCost || "N/A";
document.getElementById("severity").innerText = dtc.severity;

// SEVERITY COLOR
const severityEl = document.getElementById("severity");
if (dtc.severity === "low") severityEl.classList.add("text-green-400");
if (dtc.severity === "medium") severityEl.classList.add("text-yellow-400");
if (dtc.severity === "high") severityEl.classList.add("text-red-400");

// WHY IT MATTERS
document.getElementById("severityExplanation").innerText =
  dtc.severityExplanation || "No details available.";

// LISTS
dtc.symptoms.forEach(item => {
  symptoms.innerHTML += `<li>✔ ${item}</li>`;
});

dtc.causes.forEach(item => {
  causes.innerHTML += `<li>• ${item}</li>`;
});

dtc.fixes.forEach(item => {
  fixes.innerHTML += `<li>✔ ${item}</li>`;
});

deepDive.innerText = dtc.deepDive || "";

dtc.diagnosisSteps?.forEach(step => {
  diagnosisSteps.innerHTML += `<li>🔧 ${step}</li>`;
});

dtc.commonMistakes?.forEach(m => {
  commonMistakes.innerHTML += `<li>⚠️ ${m}</li>`;
});

if (dtc.costBreakdown) {
  costBreakdown.innerHTML = `
    <div>DIY: ${dtc.costBreakdown.diy}</div>
    <div>Independent Shop: ${dtc.costBreakdown.independentShop}</div>
    <div>Dealership: ${dtc.costBreakdown.dealership}</div>
  `;
}

// RELATED
if (dtc.relatedCodes) {
  dtc.relatedCodes.forEach(rc => {
    relatedCodes.innerHTML += `
      <a href="dtc.html?code=${rc}" 
         class="glass px-3 py-1 rounded hover:bg-white/10 transition">
         ${rc}
      </a>
    `;
  });
}

lucide.createIcons();
</script>



</body>
</html>
