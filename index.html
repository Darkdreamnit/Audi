<!-- Audi Model Explorer -->
<section id="models-section" class="mb-16">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-slate-900 mb-2">Audi Model Explorer</h2>
        <p class="text-slate-600">Select your model to see common issues and codes</p>
    </div>

    <!-- NEW DROPDOWN -->
    <div class="max-w-md mx-auto">
        <div class="relative">
            <select 
                id="model-dropdown"
                onchange="handleModelDropdown(this.value)"
                class="w-full px-5 py-4 rounded-xl border border-slate-300 bg-white shadow-md 
                focus:border-red-500 focus:ring-2 focus:ring-red-200 outline-none text-lg font-medium
                appearance-none cursor-pointer">

                <option value="">🚗 Select Your Audi Model</option>

                <optgroup label="Sedans & Coupes">
                    <option value="A1">A1</option>
                    <option value="A3">A3</option>
                    <option value="A4">A4</option>
                    <option value="A5">A5</option>
                    <option value="A6">A6</option>
                    <option value="A7">A7</option>
                    <option value="A8">A8</option>
                </optgroup>

                <optgroup label="SUVs">
                    <option value="Q3">Q3</option>
                    <option value="Q5">Q5</option>
                    <option value="Q7">Q7</option>
                    <option value="Q8">Q8</option>
                </optgroup>

                <optgroup label="Performance">
                    <option value="TT">TT</option>
                    <option value="R8">R8</option>
                </optgroup>

            </select>

            <!-- Custom dropdown arrow -->
            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                ▼
            </div>
        </div>
    </div>

    <!-- KEEP EXISTING RESULT UI -->
    <div id="model-specific-codes" class="hidden mt-8 fade-in">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-slate-900" id="model-title"></h3>
            <button onclick="clearModelFilter()" class="text-sm text-slate-500 hover:text-slate-700">
                Show All Models
            </button>
        </div>
        <div id="model-codes-list" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3"></div>
    </div>
</section>
